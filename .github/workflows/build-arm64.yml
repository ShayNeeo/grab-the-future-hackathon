name: Build arm64-v8a APK

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44.4'
  JAVA_VERSION: '17'

jobs:
  build-arm64-apk:
    name: Build ARM64-v8a APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Build arm64-v8a APK (minified + shrunk)
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --tree-shake-icons

      - name: Verify arm64-v8a only
        run: |
          APK_PATH=$(find build/app/outputs/flutter-apk -name '*arm64-v8a*.apk' | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: arm64-v8a APK not found"
            ls -la build/app/outputs/flutter-apk/
            exit 1
          fi
          SIZE=$(du -h "$APK_PATH" | cut -f1)
          SIZE_BYTES=$(stat --printf="%s" "$APK_PATH")
          echo "## APK Build Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **ABI** | arm64-v8a |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | $SIZE ($SIZE_BYTES bytes) |" >> $GITHUB_STEP_SUMMARY
          echo "| **R8 minify** | enabled |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resource shrink** | enabled |" >> $GITHUB_STEP_SUMMARY
          echo "| **Obfuscation** | enabled |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tree-shake icons** | enabled |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "APK_SIZE=$SIZE" >> $GITHUB_ENV
          echo "APK_SIZE_BYTES=$SIZE_BYTES" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: justful-arm64-v8a
          path: ${{ env.APK_PATH }}
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Justful ${{ github.ref_name }}"
          body: |
            ## Justful ${{ github.ref_name }}

            ### APK Details
            | Detail | Value |
            |--------|-------|
            | **ABI** | arm64-v8a (newest chips) |
            | **Size** | ${{ env.APK_SIZE }} (${{ env.APK_SIZE_BYTES }} bytes) |
            | **Minify (R8)** | enabled |
            | **Resource shrink** | enabled |
            | **Obfuscation** | enabled |
            | **Tree-shake icons** | enabled |

            ### Installation
            1. Download `app-arm64-v8a-release.apk` below
            2. Transfer to your Android device
            3. Open and install (enable "Install from unknown sources" if prompted)
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
