name: Build arm64-v8a APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.27.4'
  JAVA_VERSION: '17'

jobs:
  build-arm64-apk:
    name: Build ARM64-v8a APK (smallest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Build arm64-v8a APK (minified + shrunk)
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --tree-shake-icons

      - name: Verify arm64-v8a only
        run: |
          APK_PATH=$(find build/app/outputs/flutter-apk -name '*arm64-v8a*.apk' | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: arm64-v8a APK not found"
            ls -la build/app/outputs/flutter-apk/
            exit 1
          fi
          SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "## APK Build Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **ABI** | arm64-v8a |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| **R8 minify** | enabled |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resource shrink** | enabled |" >> $GITHUB_STEP_SUMMARY
          echo "| **Obfuscation** | enabled |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tree-shake icons** | enabled |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "APK_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scamshield-arm64-v8a
          path: ${{ env.APK_PATH }}
          retention-days: 30
          if-no-files-found: error
