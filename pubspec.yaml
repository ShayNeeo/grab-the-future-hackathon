name: justful
description: Justful - AI-powered scam detection for elderly users
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  lottie: ^3.0.0
  flutter_local_notifications: ^17.0.0
  intl: ^0.19.0
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3
  image_picker: ^1.1.2
  share_plus: ^12.0.2
  shared_preferences: ^2.3.1
  speech_to_text: ^7.3.0
  telephony: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
